<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اجداد ما — سفر به عمق تاریخ بشریت</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Vazirmatn:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bone: #e8dcc8;
    --parchment: #f2e8d5;
    --earth: #7a5c3a;
    --ash: #4a3728;
    --ember: #c0622a;
    --cave: #1a1208;
    --smoke: #8a7a6a;
    --accent: #d4a647;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cave);
    color: var(--bone);
    font-family: 'Vazirmatn', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* Cave texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(122,92,58,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(192,98,42,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 80px 20px 60px;
    border-bottom: 1px solid rgba(232,220,200,0.1);
  }

  .header-eyebrow {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 1s 0.2s forwards;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 8vw, 90px);
    font-weight: 700;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--bone) 0%, var(--accent) 50%, var(--bone) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: fadeUp 1s 0.4s forwards;
  }

  .header-sub {
    margin-top: 20px;
    font-size: 16px;
    color: var(--smoke);
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeUp 1s 0.6s forwards;
  }

  /* Timeline dots */
  .timeline-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 40px;
    opacity: 0;
    animation: fadeUp 1s 0.8s forwards;
  }
  .timeline-bar span {
    font-size: 11px;
    color: var(--smoke);
    letter-spacing: 2px;
  }
  .timeline-line {
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  /* Species grid */
  .species-grid {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2px;
    padding: 2px;
    max-width: 1400px;
    margin: 60px auto;
    padding: 0 20px;
  }

  .species-card {
    position: relative;
    background: rgba(26,18,8,0.8);
    border: 1px solid rgba(232,220,200,0.08);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    opacity: 0;
    transform: translateY(40px);
  }

  .species-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .species-card:hover {
    border-color: rgba(212,166,71,0.4);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(212,166,71,0.05);
  }

  .card-image-wrap {
    position: relative;
    height: 340px;
    overflow: hidden;
  }

  .card-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    filter: sepia(40%) contrast(1.1) brightness(0.85);
    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .species-card:hover .card-image-wrap img {
    filter: sepia(20%) contrast(1.05) brightness(0.95);
    transform: scale(1.04);
  }

  .card-image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--cave) 0%, rgba(26,18,8,0.4) 40%, transparent 70%);
  }

  .card-era-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(212,166,71,0.15);
    border: 1px solid rgba(212,166,71,0.3);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 5px 12px;
    backdrop-filter: blur(8px);
  }

  .card-body {
    padding: 28px 28px 32px;
  }

  .species-latin {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--smoke);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .species-name {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--bone);
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .species-tagline {
    font-size: 14px;
    color: var(--smoke);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .species-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(232,220,200,0.08);
  }

  .stat {
    flex: 1;
    text-align: center;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 10px;
    color: var(--smoke);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }

  .speak-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(212,166,71,0.3);
    color: var(--accent);
    padding: 14px 20px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .speak-btn:hover {
    background: rgba(212,166,71,0.1);
    border-color: rgba(212,166,71,0.6);
  }

  .speak-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-icon {
    width: 20px;
    height: 20px;
    border: 1px solid currentColor;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    flex-shrink: 0;
  }

  /* Story Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10,6,2,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .modal-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    position: relative;
    max-width: 680px;
    width: 100%;
    background: rgba(26,18,8,0.95);
    border: 1px solid rgba(212,166,71,0.2);
    padding: 48px;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(30px) scale(0.97);
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .modal-backdrop.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-close {
    position: absolute;
    top: 20px;
    left: 20px;
    background: transparent;
    border: 1px solid rgba(232,220,200,0.2);
    color: var(--smoke);
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover {
    border-color: var(--ember);
    color: var(--ember);
  }

  .modal-species-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--bone);
    margin-bottom: 32px;
    line-height: 1.2;
  }

  .story-content {
    font-size: 16px;
    line-height: 2;
    color: rgba(232,220,200,0.8);
  }

  .story-content p {
    margin-bottom: 20px;
  }

  /* Loading state */
  .loading-dots {
    display: flex;
    gap: 8px;
    padding: 20px 0;
  }

  .loading-dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* Skeleton loader */
  .skeleton-line {
    height: 16px;
    background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    margin-bottom: 12px;
  }

  .skeleton-line:nth-child(2) { width: 90%; }
  .skeleton-line:nth-child(3) { width: 95%; }
  .skeleton-line:nth-child(4) { width: 85%; }
  .skeleton-line:nth-child(5) { width: 92%; }

  /* Divider */
  .modal-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,166,71,0.3), transparent);
    margin: 28px 0;
  }

  /* Footer */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px;
    border-top: 1px solid rgba(232,220,200,0.06);
    color: var(--smoke);
    font-size: 13px;
    letter-spacing: 1px;
  }

  footer strong {
    color: var(--accent);
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Scrollbar */
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: rgba(212,166,71,0.3); border-radius: 2px; }

  @media (max-width: 600px) {
    .modal { padding: 32px 24px; }
    .modal-title { font-size: 26px; }
    .species-stats { gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow">سفر به عمق تاریخ بشریت</p>
  <h1>اجداد ما</h1>
  <p class="header-sub">چه کسانی قبل از ما زیستند؟ بگذار خودشان بگویند.</p>
  <div class="timeline-bar">
    <div class="timeline-line"></div>
    <span>۳ میلیون سال پیش</span>
    <div class="timeline-line"></div>
    <span>۳۰۰ هزار سال پیش</span>
    <div class="timeline-line"></div>
    <span>امروز</span>
    <div class="timeline-line"></div>
  </div>
</header>

<section class="species-grid" id="grid"></section>

<footer>
  <p>داستان‌ها توسط <strong>هوش مصنوعی</strong> از دیدگاه هر گونه روایت می‌شوند &nbsp;·&nbsp; بر اساس یافته‌های دیرین‌شناسی</p>
</footer>

<!-- Modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal" role="dialog">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <p class="modal-species-label" id="modal-latin"></p>
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-divider"></div>
    <div class="story-content" id="modal-story"></div>
  </div>
</div>

<script>
const SPECIES = [
  {
    id: "australopithecus",
    name: "اوسترالوپیتکوس",
    latin: "Australopithecus afarensis",
    era: "۳.۹ — ۲.۹ میلیون سال پیش",
    brain: "۴۵۰ سی‌سی",
    height: "۱.۱ متر",
    region: "آفریقای شرقی",
    tagline: "نخستین گام‌های ما روی زمین. نه کاملاً میمون، نه کاملاً انسان.",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Australopithecus_afarensis_-_Lucy_-_Smithsonian_Museum_of_Natural_History_-_2012-05-17.jpg/640px-Australopithecus_afarensis_-_Lucy_-_Smithsonian_Museum_of_Natural_History_-_2012-05-17.jpg",
    prompt: `تو اوسترالوپیتکوس آفارنسیس هستی - یکی از اولین اجداد بشری که ۳.۵ میلیون سال پیش در آفریقا زندگی می‌کردی. از دیدگاه اول شخص، به زبان فارسی روان و زیبا، داستان زندگی‌ات را تعریف کن. بگو کجا زندگی می‌کردی، چه می‌خوردی، چگونه راه می‌رفتی، چه خطراتی داشتی، و چه احساسی داشتی. حدود ۲۵۰ کلمه بنویس. تخیلی و احساسی باشد اما بر اساس دانش علمی واقعی.`
  },
  {
    id: "homo-habilis",
    name: "انسان ماهر",
    latin: "Homo habilis",
    era: "۲.۴ — ۱.۴ میلیون سال پیش",
    brain: "۶۱۰ سی‌سی",
    height: "۱.۳ متر",
    region: "آفریقا",
    tagline: "اولین کسی که سنگ را به ابزار تبدیل کرد. آغاز عصر فناوری.",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Homo_habilis%2C_Olduvai_Gorge%2C_Tanzania_%281%29.jpg/640px-Homo_habilis%2C_Olduvai_Gorge%2C_Tanzania_%281%29.jpg",
    prompt: `تو هومو هابیلیس - انسان ماهر - هستی. ۲ میلیون سال پیش در آفریقا زندگی می‌کردی و اولین کسی بودی که ابزارهای سنگی می‌ساختی. از دیدگاه اول شخص، به زبان فارسی روان، داستان زندگی‌ات را تعریف کن. درباره ساخت اولین ابزار، شکار، زندگی گروهی، و تفاوتت با نیاکانت بگو. حدود ۲۵۰ کلمه بنویس. تخیلی و احساسی باشد اما بر اساس دانش علمی.`
  },
  {
    id: "homo-erectus",
    name: "انسان راست‌قامت",
    latin: "Homo erectus",
    era: "۱.۹ میلیون — ۱۱۰ هزار سال پیش",
    brain: "۹۰۰ سی‌سی",
    height: "۱.۸ متر",
    region: "آفریقا، آسیا، اروپا",
    tagline: "فاتح قاره‌ها. اولین کسی که آتش را رام کرد.",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Homo_erectus_new.jpg/640px-Homo_erectus_new.jpg",
    prompt: `تو هومو اررکتوس - انسان راست‌قامت - هستی. یک میلیون سال پیش می‌زیستی و از آفریقا به آسیا مهاجرت کردی. آتش را کنترل می‌کردی. از دیدگاه اول شخص، به فارسی روان، داستان مهاجرت بزرگ و کشف آتش را تعریف کن. احساست از اولین باری که آتش دیدی و رامش کردی، و اینکه چگونه دنیا را فتح کردی. حدود ۲۵۰ کلمه. تخیلی و احساسی، بر اساس علم.`
  },
  {
    id: "neanderthal",
    name: "نئاندرتال",
    latin: "Homo neanderthalensis",
    era: "۴۰۰ — ۴۰ هزار سال پیش",
    brain: "۱۵۰۰ سی‌سی",
    height: "۱.۶ متر",
    region: "اروپا، آسیای غربی",
    tagline: "قوی‌ترین، باهوش‌ترین، و تنهاترین. رقیب ما که از بین رفت.",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Homo_neanderthalensis_adult_male_-_head_model_-_Smithsonian_Museum_of_Natural_History_-_2012-05-17.jpg/640px-Homo_neanderthalensis_adult_male_-_head_model_-_Smithsonian_Museum_of_Natural_History_-_2012-05-17.jpg",
    prompt: `تو نئاندرتال هستی - آخرین نمونه‌های نژادت ۴۰ هزار سال پیش بودند. باهوش، قوی، با مغزی بزرگ‌تر از انسان امروزی. مرده‌هایت را دفن می‌کردی، موسیقی داشتی، ابزار می‌ساختی. از دیدگاه اول شخص، به فارسی روان و غمگین، زندگی آخرین روزهایت را تعریف کن. از رقابت با هومو ساپینس، از تنهایی، از پایان نژادت بگو. حدود ۲۵۰ کلمه. احساسی و شاعرانه.`
  },
  {
    id: "denisovan",
    name: "دنیسووان",
    latin: "Homo denisova",
    era: "۳۰۰ — ۵۰ هزار سال پیش",
    brain: "نامشخص",
    height: "نامشخص",
    region: "آسیا، اقیانوسیه",
    tagline: "رازآمیزترین جد ما. فقط از روی DNA شناخته شده.",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Denisova_Cave.JPG/640px-Denisova_Cave.JPG",
    prompt: `تو دنیسووان هستی - رازآمیزترین جد بشر. تنها از یک استخوان انگشت و DNA شناخته شدی. در غارهای سیبری زندگی می‌کردی. از دیدگاه اول شخص، به فارسی روان و رمزآلود، از زندگی‌ات بگو. از اینکه هیچ‌کس چهره‌ات را نمی‌داند، از آنچه تجربه کردی، و از میراثی که در DNA انسان‌های امروزی آسیا باقی ماندی. حدود ۲۵۰ کلمه. شاعرانه و مرموز.`
  },
  {
    id: "homo-sapiens",
    name: "انسان خردمند",
    latin: "Homo sapiens",
    era: "۳۰۰ هزار سال پیش — اکنون",
    brain: "۱۳۵۰ سی‌سی",
    height: "۱.۷ متر",
    region: "تمام کره زمین",
    tagline: "بازمانده. فاتح نهایی. ما.",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Akha_cropped_hires.JPG/640px-Akha_cropped_hires.JPG",
    prompt: `تو هومو ساپینس هستی - انسان خردمند. ۳۰۰ هزار سال است که وجود داری. اجدادت با نئاندرتال‌ها ترکیب شدند، همه قاره‌ها را فتح کردند، زبان و هنر ساختند. از دیدگاه اول شخص انسان اولیه، به فارسی زیبا، از احساس غریب بودن در دنیا بگو. از اینکه چرا زنده ماندیم و بقیه نه. از آتش، غار، نقاشی، و آینده‌ای که نمی‌دانستیم می‌سازیم. حدود ۲۵۰ کلمه.`
  }
];

// Render cards
const grid = document.getElementById('grid');
SPECIES.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'species-card';
  card.style.transitionDelay = `${i * 0.1}s`;
  card.innerHTML = `
    <div class="card-image-wrap">
      <img src="${s.image}" alt="${s.name}" loading="lazy" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Gatto_europeo4.jpg/1px-Gatto_europeo4.jpg'; this.style.objectFit='contain'; this.style.background='#2a1a0a'">
      <div class="card-image-overlay"></div>
      <span class="card-era-badge">${s.era}</span>
    </div>
    <div class="card-body">
      <p class="species-latin">${s.latin}</p>
      <h2 class="species-name">${s.name}</h2>
      <p class="species-tagline">${s.tagline}</p>
      <div class="species-stats">
        <div class="stat">
          <span class="stat-value">${s.brain}</span>
          <span class="stat-label">حجم مغز</span>
        </div>
        <div class="stat">
          <span class="stat-value">${s.height}</span>
          <span class="stat-label">قد</span>
        </div>
        <div class="stat">
          <span class="stat-value" style="font-size:14px">${s.region}</span>
          <span class="stat-label">منطقه</span>
        </div>
      </div>
      <button class="speak-btn" onclick="openStory('${s.id}')">
        <span class="btn-icon">▶</span>
        بگذار خودش بگوید
      </button>
    </div>
  `;
  grid.appendChild(card);
});

// Intersection Observer for animations
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('visible');
  });
}, { threshold: 0.1 });

document.querySelectorAll('.species-card').forEach(c => observer.observe(c));

// Modal logic
function openStory(id) {
  const s = SPECIES.find(x => x.id === id);
  if (!s) return;

  document.getElementById('modal-latin').textContent = s.latin;
  document.getElementById('modal-title').textContent = `داستان ${s.name}`;
  
  const storyEl = document.getElementById('modal-story');
  storyEl.innerHTML = `
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
  `;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  fetchStory(s, storyEl);
}

async function fetchStory(species, el) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: species.prompt
        }]
      })
    });

    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || 'خطایی رخ داد.';
    
    // Format into paragraphs
    const paras = text.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
    el.innerHTML = paras || `<p>${text}</p>`;
  } catch (err) {
    el.innerHTML = `<p style="color: var(--ember)">خطا در بارگذاری داستان. لطفاً دوباره تلاش کنید.</p>`;
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// Close on backdrop click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
